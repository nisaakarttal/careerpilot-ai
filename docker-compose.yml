services:
  db:
    image: postgres:16-alpine
    container_name: careerpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: careerpilot
      POSTGRES_PASSWORD: careerpilot
      POSTGRES_DB: careerpilot
    ports:
      - "5432:5432"
    volumes:
      - careerpilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerpilot -d careerpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: careerpilot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://careerpilot:careerpilot@db:5432/careerpilot
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: careerpilot-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  careerpilot_pgdata:
