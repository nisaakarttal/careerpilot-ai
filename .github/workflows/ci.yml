name: CareerPilot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://careerpilot:careerpilot@localhost:5432/careerpilot_ci
          JWT_SECRET_KEY: ci-only-secret-key
          AI_PROVIDER: openai
          OPENAI_API_KEY: ci-placeholder-key
        run: python -m unittest discover -s tests -p "test_*.py" -v

  frontend-build:
    name: Frontend production build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
        run: npm run build

  docker-build:
    name: Docker image smoke build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --file backend/Dockerfile --tag careerpilot-backend:ci backend

      - name: Build frontend image
        run: docker build --file frontend/Dockerfile --tag careerpilot-frontend:ci frontend
